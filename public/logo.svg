<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="96"
        fill="url(#bg)"/>

  <!-- Camera -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="96" y="150" width="320" height="220" rx="36"
          fill="#FFFFFF"/>

    <!-- Top bump -->
    <path d="M150 150
             L190 110
             H275
             L305 150
             Z"
          fill="#FFFFFF"/>

    <!-- Lens -->
    <circle cx="256" cy="260" r="72"
            fill="url(#lens)"/>

    <circle cx="256" cy="260" r="42"
            fill="#0F172A"
            opacity="0.35"/>

    <circle cx="235" cy="238" r="12"
            fill="#FFFFFF"
            opacity="0.85"/>

    <!-- Viewfinder -->
    <circle cx="352" cy="188" r="12"
            fill="#22C55E"/>
  </g>

  <!-- CRM nodes -->
  <g stroke="#F59E0B" stroke-width="8" fill="#FCD34D">
    <line x1="145" y1="385" x2="210" y2="330"/>
    <line x1="367" y1="385" x2="302" y2="330"/>

    <circle cx="145" cy="385" r="18"/>
    <circle cx="367" cy="385" r="18"/>
    <circle cx="256" cy="330" r="22"/>
  </g>
</svg>
