<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Payments — Photography Tracker</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <div class="page">
    <div class="page-header">
      <h1>Payments</h1>
      <span class="subtitle" id="payCount"></span>
      <a href="settings.html" class="icon-btn" style="font-size:1.3rem" aria-label="Settings">⚙️</a>
    </div>

    <div class="card" id="summaryCard"></div>

    <div class="section-title">Payment Records</div>
    <div id="payList"></div>
  </div>

  <button class="fab" onclick="openPaymentForm()">+</button>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="payDetailModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="payDetailTitle"></h2>
        <div>
          <button class="icon-btn" onclick="editCurrentPayment()" title="Edit">✏️</button>
          <button class="icon-btn" onclick="promptDeletePay()" title="Delete">🗑️</button>
          <button class="icon-btn" onclick="closePayDetail()" title="Close">✕</button>
        </div>
      </div>
      <div id="payDetailBody"></div>
    </div>
  </div>

  <!-- Payment Form Modal -->
  <div class="modal-overlay" id="paymentFormModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="payFormTitle">New Payment</h2>
        <button class="icon-btn" onclick="closePaymentForm()">✕</button>
      </div>
      <form id="paymentForm" onsubmit="savePayment(event)">
        <div class="form-group">
          <label class="form-label">Job</label>
          <select class="form-select" id="pf_jobId" onchange="onJobSelected()"></select>
        </div>
        <div class="form-group" id="pf_jobRef" style="display:none">
          <div class="form-static" id="pf_jobInfo"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Client *</label>
          <input class="form-input" id="pf_client" required>
          <div class="form-error" id="e_pf_client">Client is required</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input class="form-input" type="date" id="pf_date" required>
          </div>
          <div class="form-group">
            <label class="form-label">Amount *</label>
            <input class="form-input" type="number" id="pf_amount" min="1" required>
            <div class="form-error" id="e_pf_amount">Amount must be greater than 0</div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Method</label>
            <select class="form-select" id="pf_method"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="pf_status"></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea class="form-textarea" id="pf_notes" placeholder="Optional notes"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closePaymentForm()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Payment</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMsg">Delete this payment?</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" onclick="executeDeletePay()">Delete</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>Dashboard</span></a>
    <a href="jobs.html" class="nav-item"><span class="nav-icon">📋</span><span>Jobs</span></a>
    <a href="payments.html" class="nav-item active"><span class="nav-icon">💰</span><span>Payments</span></a>
    <a href="tasks.html" class="nav-item"><span class="nav-icon">✅</span><span>Tasks</span></a>
    <a href="wages.html" class="nav-item"><span class="nav-icon">💲</span><span>Wages</span></a>
  </nav>

  <script src="data.js"></script>
  <script src="cloud-sync.js"></script>
  <script src="back-handler.js"></script>
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      var pendingDeleteId = null;
      var editingPayId = null;
      var formDirty = false;

      // ── Detail Modal ──
      window.openPayDetail = function(payId) {
        var pays = DataStore.getPayments();
        var payment = pays.find(function(p) { return p.id === payId; });
        if (!payment) return;
        window._currentPayId = payId;
        document.getElementById('payDetailTitle').textContent = payment.client;
        var body = document.getElementById('payDetailBody');
        body.innerHTML =
          '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">ID</span><span>' + payment.id + '</span></div>' +
          '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">Date</span><span>' + formatDate(payment.paymentDate) + '</span></div>' +
          '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">Amount</span><span style="color:var(--green)">' + formatCurrency(payment.amount) + '</span></div>' +
          '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">Method</span><span>' + escHtml(payment.method) + '</span></div>' +
          '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">Status</span><span class="badge ' + paymentStatusClass(payment.status) + '">' + payment.status + '</span></div>' +
          (payment.jobId ? '<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--border)"><span style="width:80px;color:var(--text3)">Job</span><span>' + payment.jobId + '</span></div>' : '') +
          '<div style="display:flex;padding:6px 0"><span style="width:80px;color:var(--text3)">Notes</span><span>' + escHtml(payment.notes || '—') + '</span></div>';
        document.getElementById('payDetailModal').classList.add('open');
      };

      window.closePayDetail = function() {
        document.getElementById('payDetailModal').classList.remove('open');
        window._currentPayId = null;
      };
      document.getElementById('payDetailModal').onclick = function(e) { if (e.target === this) closePayDetail(); };

      window.editCurrentPayment = function() {
        var payId = window._currentPayId;
        if (!payId) return;
        closePayDetail();
        var pays = DataStore.getPayments();
        var payment = pays.find(function(p) { return p.id === payId; });
        if (payment) openPaymentForm(payment);
      };

      function render() {
        var pays = DataStore.getPayments();
        document.getElementById('payCount').textContent = pays.length + ' payment' + (pays.length !== 1 ? 's' : '');

        var totalCollected = 0, pendingCount = 0;
        pays.forEach(function(p) {
          if (p.status === 'PAID') totalCollected += p.amount;
          else pendingCount++;
        });
        var uniqueClients = new Set(pays.map(function(p) { return p.client; })).size;

        document.getElementById('summaryCard').innerHTML =
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">' +
            '<div><div style="font-size:1.3rem;font-weight:700;color:var(--green)">' + formatCurrency(totalCollected) + '</div><div class="text-xs text-muted">Collected</div></div>' +
            '<div><div style="font-size:1.3rem;font-weight:700;color:' + (pendingCount > 0 ? 'var(--red)' : 'var(--text3)') + '">' + pendingCount + '</div><div class="text-xs text-muted">Pending</div></div>' +
            '<div><div style="font-size:1.3rem;font-weight:700;color:var(--accent)">' + uniqueClients + '</div><div class="text-xs text-muted">Clients</div></div>' +
          '</div>';

        var list = document.getElementById('payList');
        if (pays.length === 0) {
          list.innerHTML = '<div class="empty-state"><div class="empty-icon">💰</div><div class="empty-text">No payment records yet</div></div>';
          return;
        }

        list.innerHTML = '';
        pays.forEach(function(p) {
          var card = document.createElement('div');
          card.className = 'entry-card';
          card.onclick = function() { openPayDetail(p.id); };
          card.innerHTML =
            '<div class="entry-card-top">' +
              '<div><div class="entry-card-client">' + escHtml(p.client) + '</div><div class="entry-card-job">' + p.id + ' · ' + formatDate(p.paymentDate) + '</div></div>' +
              '<span class="badge ' + paymentStatusClass(p.status) + '">' + p.status + '</span>' +
            '</div>' +
            '<div class="entry-card-details">' +
              '<span><span class="detail-icon">💳</span>' + escHtml(p.method) + '</span>' +
              '<span><span class="detail-icon">💰</span>' + formatCurrency(p.amount) + '</span>' +
              (p.jobId ? '<span><span class="detail-icon">📋</span>' + p.jobId + '</span>' : '') +
            '</div>';
          list.appendChild(card);
        });
      }

      // ── Payment Form ──
      window.openPaymentForm = function(payment) {
        var lists = DataStore.getLists();
        populateSelect('pf_method', lists.paymentMethods, 'Cash');
        populateSelect('pf_status', lists.paymentStatuses, 'UNPAID');

        var jobs = DataStore.getJobs();
        var sel = document.getElementById('pf_jobId');
        sel.innerHTML = '<option value="">— None (standalone) —</option>';
        jobs.forEach(function(j) {
          var opt = document.createElement('option');
          opt.value = j.id;
          opt.textContent = j.id + ' — ' + j.client + ' (' + j.jobType + ')';
          sel.appendChild(opt);
        });

        if (payment) {
          editingPayId = payment.id;
          document.getElementById('pf_client').value = payment.client || '';
          document.getElementById('pf_date').value = excelToDateInput(payment.paymentDate);
          document.getElementById('pf_amount').value = payment.amount || '';
          document.getElementById('pf_notes').value = payment.notes || '';
          document.getElementById('pf_jobId').value = payment.jobId || '';
          if (payment.jobId) onJobSelected();
          document.getElementById('payFormTitle').textContent = 'Edit Payment';
          document.querySelector('#paymentForm .btn-primary').textContent = 'Update Payment';
        } else {
          editingPayId = null;
          document.getElementById('pf_client').value = '';
          document.getElementById('pf_date').value = new Date().toISOString().slice(0, 10);
          document.getElementById('pf_amount').value = '';
          document.getElementById('pf_notes').value = '';
          document.getElementById('pf_jobRef').style.display = 'none';
          document.getElementById('payFormTitle').textContent = 'New Payment';
          document.querySelector('#paymentForm .btn-primary').textContent = 'Save Payment';
        }
        clearErrorsPay();
        formDirty = false;
        // Track form changes
        document.querySelectorAll('#paymentForm input, #paymentForm select, #paymentForm textarea').forEach(function(el) {
          el.addEventListener('input', function() { formDirty = true; });
          el.addEventListener('change', function() { formDirty = true; });
        });
        document.getElementById('paymentFormModal').classList.add('open');
      };

      window.closePaymentForm = function() {
        if (formDirty && !confirm('Discard unsaved changes?')) return;
        document.getElementById('paymentFormModal').classList.remove('open');
        formDirty = false;
      };
      document.getElementById('paymentFormModal').onclick = function(e) { if (e.target === this) closePaymentForm(); };

      window.onJobSelected = function() {
        var jobId = document.getElementById('pf_jobId').value;
        var ref = document.getElementById('pf_jobRef');
        if (jobId) {
          var job = DataStore.getJob(jobId);
          if (job) {
            document.getElementById('pf_jobInfo').innerHTML =
              '<strong>' + escHtml(job.client) + '</strong> · ' + job.jobType + '<br>' +
              'Total: ' + formatCurrency(job.totalFee) + ' · Balance: ' + formatCurrency(job.balance);
            document.getElementById('pf_client').value = job.client;
            ref.style.display = 'block';
          }
        } else {
          ref.style.display = 'none';
        }
      };

      window.savePayment = function(e) {
        e.preventDefault();
        var client = document.getElementById('pf_client').value.trim();
        var amount = parseFloat(document.getElementById('pf_amount').value);
        if (!client) {
          document.getElementById('e_pf_client').classList.add('visible');
          document.getElementById('pf_client').classList.add('error');
          return;
        }
        if (!amount || amount <= 0) {
          document.getElementById('e_pf_amount').classList.add('visible');
          document.getElementById('pf_amount').classList.add('error');
          return;
        }
        clearErrorsPay();

        var jobId = document.getElementById('pf_jobId').value;
        var job = jobId ? DataStore.getJob(jobId) : null;

        var data = {
          jobId: jobId,
          client: client,
          paymentDate: dateToExcel(document.getElementById('pf_date').value),
          amount: amount,
          method: document.getElementById('pf_method').value,
          status: document.getElementById('pf_status').value,
          jobTotalFee: job ? job.totalFee : 0,
          jobBalance: job ? job.balance : 0,
          notes: document.getElementById('pf_notes').value.trim()
        };

        if (editingPayId) {
          DataStore.updatePayment(editingPayId, data);
          showToast('Payment updated');
        } else {
          DataStore.addPayment(data);
          showToast('Payment added');
        }
        formDirty = false;
        closePaymentForm();
        render();
      };

      // ── Delete Payment ──
      window.promptDeletePay = function(id) {
        if (!id) id = window._currentPayId;
        if (!id) return;
        closePayDetail();
        pendingDeleteId = id;
        var pays = DataStore.getPayments();
        var p = pays.find(function(x) { return x.id === id; });
        if (p) {
          document.getElementById('confirmMsg').textContent = 'Delete payment for "' + p.client + '" (' + formatCurrency(p.amount) + ')?';
        } else {
          document.getElementById('confirmMsg').textContent = 'Delete this payment?';
        }
        document.getElementById('confirmOverlay').classList.add('open');
      };

      window.closeConfirm = function() { document.getElementById('confirmOverlay').classList.remove('open'); pendingDeleteId = null; };

      window.executeDeletePay = function() {
        if (!pendingDeleteId) return;
        DataStore.deletePayment(pendingDeleteId);
        closeConfirm();
        showToast('Payment deleted');
        render();
      };

      function clearErrorsPay() {
        document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
        document.querySelectorAll('.form-input.error').forEach(function(el) { el.classList.remove('error'); });
      }

      document.getElementById('pf_client').oninput = function() { this.classList.remove('error'); document.getElementById('e_pf_client').classList.remove('visible'); };
      document.getElementById('pf_amount').oninput = function() { this.classList.remove('error'); document.getElementById('e_pf_amount').classList.remove('visible'); };

      function populateSelect(id, options, selected) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        options.forEach(function(o) {
          var opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          if (o === selected) opt.selected = true;
          sel.appendChild(opt);
        });
      }

      render();
    })();
  </script>
</body>
</html>
