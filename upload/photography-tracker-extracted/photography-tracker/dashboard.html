<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Dashboard — Photography Tracker</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <div class="page" id="app">
    <div class="page-header">
      <h1>Dashboard</h1>
      <span class="subtitle" id="todayLabel"></span>
      <a href="settings.html" class="icon-btn" style="font-size:1.3rem" aria-label="Settings">⚙️</a>
    </div>

    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="section-title">Quick Views</div>
    <div class="quick-links" id="quickLinks"></div>

    <div class="section-title">Job Status Workflow</div>
    <div class="card" id="workflowCard"></div>
  </div>

  <div class="section-title">Data</div>
  <div class="card" style="display:flex;gap:10px">
    <button class="btn btn-primary" onclick="DataStore.exportData()" style="flex:1">📤 Export Backup</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFileInput').click()" style="flex:1">📥 Import Backup</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </a>
    <a href="jobs.html" class="nav-item">
      <span class="nav-icon">📋</span><span>Jobs</span>
    </a>
    <a href="payments.html" class="nav-item">
      <span class="nav-icon">💰</span><span>Payments</span>
    </a>
    <a href="tasks.html" class="nav-item">
      <span class="nav-icon">✅</span><span>Tasks</span>
    </a>
    <a href="wages.html" class="nav-item">
      <span class="nav-icon">💲</span><span>Wages</span>
    </a>
  </nav>

  <script src="data.js"></script>
  <script src="cloud-sync.js"></script>
  <script src="back-handler.js"></script>
  <script>
    (function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var today = new Date();
      document.getElementById('todayLabel').textContent = DAYS[today.getDay()] + ', ' + today.getDate() + ' ' + MONTHS[today.getMonth()] + ' ' + today.getFullYear();

      function render() {
        var m = DataStore.getMetrics();
        var jobs = DataStore.getJobs();
        var pays = DataStore.getPayments();

        var metrics = [
          { label: 'Active Jobs',      value: m.activeJobs,        cls: m.activeJobs > 0 ? 'positive' : 'zero' },
          { label: 'Upcoming Active',  value: m.upcomingActiveJobs, cls: m.upcomingActiveJobs > 0 ? 'info' : 'zero' },
          { label: 'In Editing',       value: m.jobsInEditing,       cls: m.jobsInEditing > 0 ? 'warn' : 'zero' },
          { label: 'Outstanding Bal.', value: formatCurrency(m.outstandingBalance), cls: m.outstandingBalance > 0 ? 'alert' : 'zero' },
          { label: 'Open Tasks',       value: m.openTasks,           cls: m.openTasks > 0 ? 'info' : 'zero' },
          { label: 'Overdue Tasks',    value: m.overdueOpenTasks,    cls: m.overdueOpenTasks > 0 ? 'alert' : 'zero' }
        ];

        var grid = document.getElementById('metricsGrid');
        grid.innerHTML = '';
        metrics.forEach(function(mt) {
          var div = document.createElement('div');
          div.className = 'metric-card';
          div.innerHTML = '<div class="metric-value ' + mt.cls + '">' + mt.value + '</div><div class="metric-label">' + mt.label + '</div>';
          grid.appendChild(div);
        });

        var links = [
          { href: 'jobs.html',       icon: '📋', label: 'Jobs',          count: jobs.length + ' job' + (jobs.length !== 1 ? 's' : '') },
          { href: 'jobs.html?filter=editing', icon: '✂️', label: 'Editing Queue', count: m.jobsInEditing + ' job' + (m.jobsInEditing !== 1 ? 's' : '') },
          { href: 'payments.html',   icon: '💰', label: 'Payments',      count: pays.length + ' payment' + (pays.length !== 1 ? 's' : '') },
          { href: 'tasks.html',      icon: '✅', label: 'Open Tasks',    count: m.openTasks + ' open' },
          { href: 'wages.html',      icon: '💲', label: 'Wages',         count: m.totalWageRecords + ' distribution' + (m.totalWageRecords !== 1 ? 's' : '') }
        ];

        var ql = document.getElementById('quickLinks');
        ql.innerHTML = '';
        links.forEach(function(lnk) {
          var a = document.createElement('a');
          a.href = lnk.href; a.className = 'quick-link';
          a.innerHTML = '<div class="quick-link-icon">' + lnk.icon + '</div><div class="quick-link-label">' + lnk.label + '</div><div class="quick-link-count">' + lnk.count + '</div>';
          ql.appendChild(a);
        });

        var statuses = DataStore.getLists().jobStatuses;
        document.getElementById('workflowCard').innerHTML =
          '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:4px 0">' +
          statuses.map(function(s, i) {
            var arrow = i < statuses.length - 1 ? '<span style="color:var(--text3);margin:0 4px">→</span>' : '';
            return '<span class="badge ' + jobStatusClass(s) + '">' + s + '</span>' + arrow;
          }).join('') + '</div>';
      }

      DataStore.onChange(render);
      render();
      window.handleImport = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        if (!confirm('Import will REPLACE all current data. Continue?')) {
          e.target.value = '';
          return;
        }
        var reader = new FileReader();
        reader.onload = function(ev) {
          try {
            DataStore.importData(ev.target.result);
            showToast('Data imported successfully');
            setTimeout(function() { location.reload(); }, 800);
          } catch(err) {
            showToast('Import failed: ' + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };
    })();
  </script>
</body>
</html>
