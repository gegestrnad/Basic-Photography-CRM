<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f13">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>Wages — Photography Tracker</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <div class="page">
    <div class="page-header">
      <h1>💲 Wages</h1>
      <span class="subtitle" id="wageCount"></span>
      <a href="settings.html" class="icon-btn" style="font-size:1.3rem" aria-label="Settings">⚙️</a>
    </div>

    <!-- Summary -->
    <div class="wage-summary-grid" id="wageSummary"></div>

    <!-- Calculator -->
    <div class="section-title">Wage Calculator</div>

    <div class="wage-calculator-card" id="calculatorCard">
      <div class="wage-field">
        <label for="wc_job">Select Job</label>
        <select id="wc_job" onchange="onJobSelected()">
          <option value="">— Choose a job —</option>
        </select>
      </div>

      <div id="wc_jobInfo" style="display:none">
        <div class="wage-info-row">
          <span class="wage-info-label">Total Paid (from Payments)</span>
          <span class="wage-info-value" id="wc_totalPaid">Rp0</span>
        </div>
        <div class="wage-info-row">
          <span class="wage-info-label">Distributable Ratio</span>
          <span class="wage-info-value" id="wc_ratio">62.5%</span>
        </div>

        <div class="wage-field" style="margin-top:12px">
          <label for="wc_base">Distributable Base</label>
          <input type="number" id="wc_base" min="0" step="1000" oninput="onBaseChanged()">
        </div>

        <div id="wc_breakdown" style="display:none">
          <div class="wage-breakdown-table" id="wc_breakdownTable"></div>
        </div>

        <div id="wc_notice" style="display:none" class="wage-notice"></div>

        <div class="wage-calc-actions" id="wc_actions" style="display:none">
          <button class="btn btn-secondary" onclick="clearCalculator()">Clear</button>
          <button class="btn btn-primary" onclick="saveDistribution()">💾 Save Distribution</button>
        </div>
      </div>

      <div id="wc_empty" class="wage-empty">
        <div class="empty-icon" style="font-size:2rem;margin-bottom:8px">📋</div>
        <div>Select a job to calculate wages</div>
      </div>
    </div>

    <!-- Saved Distributions -->
    <div class="section-title">Saved Distributions</div>
    <div id="savedList"></div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h2 id="detailTitle"></h2>
        <div>
          <button class="icon-btn" onclick="promptDeleteDetail()" title="Delete">🗑️</button>
          <button class="icon-btn" onclick="closeDetail()" title="Close">✕</button>
        </div>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMsg">Delete this wage distribution?</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" onclick="executeDelete()">Delete</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>Dashboard</span></a>
    <a href="jobs.html" class="nav-item"><span class="nav-icon">📋</span><span>Jobs</span></a>
    <a href="payments.html" class="nav-item"><span class="nav-icon">💰</span><span>Payments</span></a>
    <a href="tasks.html" class="nav-item"><span class="nav-icon">✅</span><span>Tasks</span></a>
    <a href="wages.html" class="nav-item active"><span class="nav-icon">💲</span><span>Wages</span></a>
  </nav>

  <script src="data.js"></script>
  <script src="cloud-sync.js"></script>
  <script src="back-handler.js"></script>
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      var pendingDeleteId = null;
      var currentCalculation = null;
      var formDirty = false;

      // ── Summary ──
      function updateSummary() {
        var m = DataStore.getMetrics();
        var wds = DataStore.getWageDistributions();
        var totalCalc = wds.reduce(function(sum, w) { return sum + (w.distributableBase || 0); }, 0);
        document.getElementById('wageCount').textContent = wds.length + ' distribution' + (wds.length !== 1 ? 's' : '');
        document.getElementById('wageSummary').innerHTML =
          '<div class="wage-summary-item">' +
            '<div class="wage-summary-label">Total Calculated</div>' +
            '<div class="wage-summary-value" style="color:var(--accent)">' + formatCurrency(totalCalc) + '</div>' +
          '</div>' +
          '<div class="wage-summary-item">' +
            '<div class="wage-summary-label">Saved Records</div>' +
            '<div class="wage-summary-value">' + m.totalWageRecords + '</div>' +
          '</div>';
      }

      // ── Job Dropdown ──
      function populateJobs() {
        var jobs = DataStore.getJobs();
        var sel = document.getElementById('wc_job');
        sel.innerHTML = '<option value="">— Choose a job —</option>';
        jobs.forEach(function(j) {
          var opt = document.createElement('option');
          opt.value = j.id;
          opt.textContent = j.id + ' — ' + j.client + ' (' + j.jobType + ')';
          sel.appendChild(opt);
        });
      }

      // ── Job Selected ──
      window.onJobSelected = function() {
        var jobId = document.getElementById('wc_job').value;
        if (!jobId) {
          document.getElementById('wc_jobInfo').style.display = 'none';
          document.getElementById('wc_empty').style.display = 'block';
          currentCalculation = null;
          formDirty = false;
          return;
        }
        document.getElementById('wc_empty').style.display = 'none';
        document.getElementById('wc_jobInfo').style.display = 'block';

        var config = DataStore.getWageConfig();
        document.getElementById('wc_ratio').textContent = Math.round(config.distributableRatio * 100) + '%';

        // Calculate initial wages
        var result = DataStore.calculateWages(jobId, null);
        currentCalculation = result;
        document.getElementById('wc_totalPaid').textContent = formatCurrency(result.totalPaid);
        document.getElementById('wc_base').value = result.distributableBase;
        renderBreakdown(result);
        formDirty = false;
      };

      // ── Base Changed ──
      window.onBaseChanged = function() {
        var jobId = document.getElementById('wc_job').value;
        if (!jobId) return;
        var base = parseFloat(document.getElementById('wc_base').value);
        if (!base || base <= 0) {
          document.getElementById('wc_breakdown').style.display = 'none';
          document.getElementById('wc_actions').style.display = 'none';
          return;
        }
        var result = DataStore.calculateWages(jobId, base);
        currentCalculation = result;
        renderBreakdown(result);
        formDirty = true;
      };

      // ── Render Breakdown ──
      function renderBreakdown(result) {
        var container = document.getElementById('wc_breakdownTable');
        var actions = document.getElementById('wc_actions');
        var notice = document.getElementById('wc_notice');

        if (!result.breakdown || result.breakdown.length === 0) {
          document.getElementById('wc_breakdown').style.display = 'none';
          actions.style.display = 'none';
          notice.style.display = 'block';
          notice.textContent = 'No staff roles mapped for wage distribution. Add roles in Settings.';
          return;
        }

        document.getElementById('wc_breakdown').style.display = 'block';
        actions.style.display = 'flex';
        notice.style.display = 'none';

        // Check if already saved for this job
        var existing = DataStore.getWageDistributionsByJob(result.jobId);
        if (existing.length > 0) {
          notice.style.display = 'block';
          notice.textContent = '⚠️ ' + existing.length + ' distribution(s) already saved for this job. Save again to add another.';
        }

        var html = '<div class="wage-bd-header"><span>Staff</span><span style="text-align:center">%</span><span style="text-align:right">Amount</span></div>';

        result.breakdown.forEach(function(b) {
          var rolesStr = '';
          if (b.roles && b.roles.length > 0) {
            b.roles.forEach(function(r, i) {
              var rule = DataStore.getWageRules().find(function(rl) { return rl.role === r; });
              if (rule) {
                rolesStr += (i > 0 ? ', ' : '') + r + ' ' + Math.round(rule.percentage * 100) + '%';
              } else {
                rolesStr += (i > 0 ? ', ' : '') + r;
              }
            });
          }
          html +=
            '<div class="wage-bd-row">' +
              '<div><div class="wage-bd-name">' + escHtml(b.staffName) + '</div><div class="wage-bd-roles">' + escHtml(rolesStr) + '</div></div>' +
              '<div class="wage-bd-pct">' + Math.round(b.percentage * 100) + '%</div>' +
              '<div class="wage-bd-amount">' + formatCurrency(b.amount) + '</div>' +
            '</div>';
        });

        html +=
          '<div class="wage-bd-total-row">' +
            '<span>Total</span>' +
            '<span></span>' +
            '<span class="wage-bd-amount">' + formatCurrency(result.distributableBase) + '</span>' +
          '</div>';

        container.innerHTML = html;
      }

      // ── Save Distribution ──
      window.saveDistribution = function() {
        if (!currentCalculation) return;
        var base = parseFloat(document.getElementById('wc_base').value);
        if (!base || base <= 0) {
          showToast('Enter a valid distributable base amount');
          return;
        }

        var wd = {
          jobId: currentCalculation.jobId,
          totalPaid: currentCalculation.totalPaid,
          distributableBase: currentCalculation.distributableBase,
          breakdown: currentCalculation.breakdown,
          created: dateToExcel(new Date().toISOString().slice(0, 10))
        };

        DataStore.addWageDistribution(wd);
        showToast('✅ Wage distribution saved');
        currentCalculation = null;
        formDirty = false;
        clearCalculator();
        updateSummary();
        renderSaved();
      };

      // ── Clear Calculator ──
      window.clearCalculator = function() {
        document.getElementById('wc_job').value = '';
        document.getElementById('wc_jobInfo').style.display = 'none';
        document.getElementById('wc_breakdown').style.display = 'none';
        document.getElementById('wc_actions').style.display = 'none';
        document.getElementById('wc_notice').style.display = 'none';
        document.getElementById('wc_empty').style.display = 'block';
        currentCalculation = null;
        formDirty = false;
      };

      // ── Saved Distributions ──
      function renderSaved() {
        var wds = DataStore.getWageDistributions();
        var container = document.getElementById('savedList');

        if (wds.length === 0) {
          container.innerHTML = '<div class="wage-empty"><div class="empty-icon" style="font-size:2rem;margin-bottom:8px">📄</div><div class="empty-text">No wage distributions saved yet</div></div>';
          return;
        }

        container.innerHTML = '<div class="wage-saved-list">';

        // Show newest first
        var sorted = wds.slice().reverse();
        sorted.forEach(function(w) {
          var job = DataStore.getJob(w.jobId);
          var jobLabel = job ? job.client + ' (' + w.jobId + ')' : w.jobId;
          var staffCount = w.breakdown ? w.breakdown.length : 0;

          var item = document.createElement('div');
          item.className = 'wage-saved-item';
          item.onclick = function() { openDetail(w.id); };
          item.innerHTML =
            '<div class="wage-saved-info">' +
              '<div class="wage-saved-job">' + escHtml(jobLabel) + '</div>' +
              '<div class="wage-saved-meta">Base: ' + formatCurrency(w.distributableBase) + ' · ' + staffCount + ' staff · ' + formatDate(w.created) + '</div>' +
            '</div>' +
            '<div class="wage-saved-actions">' +
              '<button class="icon-btn" onclick="event.stopPropagation();promptDelete(\'' + w.id + '\')" title="Delete">🗑️</button>' +
            '</div>';
          container.appendChild(item);
        });
        // container already has the child items — wrap with class
        container.innerHTML = '<div class="wage-saved-list">' + container.innerHTML + '</div>';
      }

      // Instead of above, fix it:
      function renderSavedFixed() {
        var wds = DataStore.getWageDistributions();
        var container = document.getElementById('savedList');
        container.innerHTML = '';

        if (wds.length === 0) {
          container.innerHTML = '<div class="wage-empty"><div class="empty-icon" style="font-size:2rem;margin-bottom:8px">📄</div><div class="empty-text">No wage distributions saved yet</div></div>';
          return;
        }

        var sorted = wds.slice().reverse();
        var listDiv = document.createElement('div');
        listDiv.className = 'wage-saved-list';

        sorted.forEach(function(w) {
          var job = DataStore.getJob(w.jobId);
          var jobLabel = job ? job.client + ' (' + w.jobId + ')' : w.jobId;
          var staffCount = w.breakdown ? w.breakdown.length : 0;

          var item = document.createElement('div');
          item.className = 'wage-saved-item';
          item.onclick = function() { openDetail(w.id); };
          item.innerHTML =
            '<div class="wage-saved-info">' +
              '<div class="wage-saved-job">' + escHtml(jobLabel) + '</div>' +
              '<div class="wage-saved-meta">Base: ' + formatCurrency(w.distributableBase) + ' · ' + staffCount + ' staff · ' + formatDate(w.created) + '</div>' +
            '</div>' +
            '<div class="wage-saved-actions">' +
              '<button class="icon-btn" onclick="event.stopPropagation();promptDelete(\'' + w.id + '\')" title="Delete">🗑️</button>' +
            '</div>';
          listDiv.appendChild(item);
        });

        container.appendChild(listDiv);
      }

      // Override renderSaved with the fixed version
      renderSaved = renderSavedFixed;

      // ── Detail Modal ──
      var _currentDetailId = null;

      window.openDetail = function(wdId) {
        _currentDetailId = wdId;
        var wds = DataStore.getWageDistributions();
        var w = wds.find(function(x) { return x.id === wdId; });
        if (!w) return;

        var job = DataStore.getJob(w.jobId);
        var jobLabel = job ? job.client + ' (' + w.jobId + ')' : w.jobId;

        document.getElementById('detailTitle').textContent = jobLabel;

        var html = '';
        html += '<div class="modal-section"><div class="modal-section-title">Overview</div>';
        html += '<div class="modal-field"><span class="field-label">ID</span><span class="field-value">' + w.id + '</span></div>';
        html += '<div class="modal-field"><span class="field-label">Total Paid</span><span class="field-value">' + formatCurrency(w.totalPaid || 0) + '</span></div>';
        html += '<div class="modal-field"><span class="field-label">Distributable Base</span><span class="field-value" style="color:var(--accent)">' + formatCurrency(w.distributableBase) + '</span></div>';
        html += '<div class="modal-field"><span class="field-label">Date Calculated</span><span class="field-value">' + formatDate(w.created) + '</span></div>';
        html += '</div>';

        html += '<div class="modal-section"><div class="modal-section-title">Staff Breakdown</div>';
        if (w.breakdown && w.breakdown.length > 0) {
          w.breakdown.forEach(function(b) {
            var rolesStr = '';
            if (b.roles) rolesStr = b.roles.join(', ');
            // Show individual role percentages
            var detailStr = '';
            if (b.roles) {
              var rules = DataStore.getWageRules();
              b.roles.forEach(function(r, i) {
                var rule = rules.find(function(rl) { return rl.role === r; });
                if (rule) detailStr += (i > 0 ? ' + ' : '') + Math.round(rule.percentage * 100) + '%';
              });
            }
            html +=
              '<div class="modal-field">' +
                '<span class="field-label">' + escHtml(b.staffName) + (rolesStr ? '<br><span style="font-size:0.72rem;color:var(--text3)">' + escHtml(rolesStr) + '</span>' : '') + '</span>' +
                '<span class="field-value" style="color:var(--green)">' + formatCurrency(b.amount) + (detailStr ? '<br><span style="font-size:0.72rem;color:var(--text3)">(' + detailStr + ')</span>' : '') + '</span>' +
              '</div>';
          });
          html += '<div class="modal-field" style="border-top:2px solid rgba(255,255,255,0.08);padding-top:10px;margin-top:4px">' +
            '<span class="field-label" style="font-weight:600">Total</span>' +
            '<span class="field-value" style="font-weight:700;color:var(--accent);font-size:1rem">' + formatCurrency(w.distributableBase) + '</span>' +
          '</div>';
        }
        html += '</div>';

        document.getElementById('detailBody').innerHTML = html;
        document.getElementById('detailModal').classList.add('open');
      };

      window.closeDetail = function() {
        document.getElementById('detailModal').classList.remove('open');
        _currentDetailId = null;
      };
      document.getElementById('detailModal').onclick = function(e) { if (e.target === this) closeDetail(); };

      // ── Delete ──
      window.promptDelete = function(id) {
        pendingDeleteId = id;
        document.getElementById('confirmMsg').textContent = 'Delete this wage distribution?';
        document.getElementById('confirmOverlay').classList.add('open');
      };

      window.promptDeleteDetail = function() {
        if (_currentDetailId) {
          var id = _currentDetailId;
          closeDetail();
          setTimeout(function() { promptDelete(id); }, 200);
        }
      };

      window.closeConfirm = function() { document.getElementById('confirmOverlay').classList.remove('open'); pendingDeleteId = null; };

      window.executeDelete = function() {
        if (!pendingDeleteId) return;
        DataStore.deleteWageDistribution(pendingDeleteId);
        pendingDeleteId = null;
        closeConfirm();
        updateSummary();
        renderSaved();
        showToast('✅ Wage distribution deleted');
      };

      // ── Init ──
      populateJobs();
      updateSummary();
      renderSaved();

      DataStore.onChange(function() {
        populateJobs();
        updateSummary();
        renderSaved();
      });

    })();
  </script>
</body>
</html>
